<script>
    function updateClock() {
        var todayDate = new Date();
        var todayTime = todayDate.toLocaleTimeString();
        var clockElement = document.getElementById('clock');
        clockElement.textContent = todayTime;
    }
    setInterval(updateClock, 1000);
    updateClock(); 
    function refreshPage() {
        window.location.reload();
    }
    const refreshInterval = setInterval(refreshPage, 30000);
    document.getElementById("refreshbutton").addEventListener("click", function() {
        clearInterval(refreshInterval);
        refreshPage();
    });

    document.getElementById("Station").addEventListener("change",function(){
        const selectedStation = this.value;
        fetch(`http://localhost:5000/trains/${selectedStation}`)
        .then(response => response.json()).then(data =>  {console.log(data[0]);let htmlTable="<table style='width: 100%;'><tr><th>Train</th><th>Line</th><th>DESTINATION</th><th>Departure Time</th><th>STATUS</th></tr>";
            for (let i of data){
                let statusColor = "white";
                if (i.STATUS.includes("Cancelled")) statusColor = "red";
                else if (i.STATUS.includes("Min") && i.SEC_LATE > 0) statusColor = "orange";
                htmlTable+= `<tr style='text-align: center;'><td>${i.TRAIN_ID}</td><td>${i.LINE}</td><td>${i.DESTINATION}</td><td>${i.SCHED_DEP_DATE}</td><td>${i.STATUS}</td></tr>`;}
            htmlTable+=`</table>`;
            document.getElementById("train_data").innerHTML=htmlTable;})
    });
</script>

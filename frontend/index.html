<script>
    function updateClock() {
        var todayDate = new Date();
        var todayTime = todayDate.toLocaleTimeString();
        var clockElement = document.getElementById('clock');
        clockElement.textContent = todayTime;
    }
    setInterval(updateClock, 1000);
    updateClock(); 
    function refreshPage(station) {
        fetch_train_data(station);
    }
    const refreshInterval = setInterval(() => {refreshPage(document.getElementById("Station").value);}, 60000);
    document.getElementById("refreshbutton").addEventListener("click", function() {
        clearInterval(refreshInterval);
        refreshPage(document.getElementById("Station").value);
    });
    function allStops(trainId){
        fetch(`http://localhost:5000/trains/stops/${trainId}`).then (response => response.json()).then (data => {console.log(data);
            let stop=data["STOPS"];
            let stopsList="";
            for (let i of stop){
                let stopColor = i["DEPARTED"] === "YES" ? "#666" : "white";
                stopsList += `<div style='color:${stopColor}'>${i["STATIONNAME"]}</div>`;
            }
            document.getElementById(`stops-content-${trainId}`).innerHTML= stopsList;
            document.getElementById(`stops-${trainId}`).style.display="block";
        })
    }
    function toggleStops(trainId) {
        const row = document.getElementById(`stops-${trainId}`);
        if (row.style.display === "none") {
            allStops(trainId);
        } else {
            row.style.display = "none";
        }
}
    function fetch_train_data(station){
        fetch(`http://localhost:5000/trains/${station}`)
        .then(response => response.json()).then(data =>  {console.log(data[1]);let htmlTable="<div id='styletable'><table style='width: 100%;border-collapse: collapse;border: 1px solid #2a2a2a;border-radius: 9px;'><tr><th style='rgb(187, 193, 35)'>DEPARTURE TIME</th><th>TRAIN</th><th>STOPS</th><th>LINE</th><th>DESTINATION</th><th>STATUS</th></tr>";
            for (let i of data){
                let displaystatus = i.STATUS;
                let statusColor = "white";
                let statusBg = "transparent";
                let dotColor = "";
                if (!i.STATUS) {

                } else if (i.STATUS.includes("Cancelled")) { 
                    statusColor = "#ef4444"; statusBg = "#2e0a0a"; 
                } else if (i.SEC_LATE > 120) { 
                    statusColor = "#fbbf24"; statusBg = "#4d2e0a"; 
                    displaystatus = `+${Math.floor(i.SEC_LATE/60)} mins delayed`; 
                } else if (i.STATUS.includes("Min")) { 
                    statusColor = "#34d471"; statusBg = "#0d2e1a"; 
                }
                let dot = "";
                if (statusBg !== "transparent") {
                    dot =`<span style='display:inline-block;width:8px;height:8px;border-radius:50%;background-color:${statusColor};animation:pulsating 1.5s infinite;margin-right:8px;'></span>`;
                }

                htmlTable+= `<tr style='text-align: center;'><td style='color: rgb(187, 193, 35)'>${i.SCHED_DEP_DATE}</td><td>${i.TRAIN_ID}</td><td><button onclick="toggleStops('${i.TRAIN_ID}')" style="'background:none;border:1px solid #444;color:white;cursor:pointer;padding:4px 8px;border-radius:4px;">▼</button></td><td>${i.LINE}</td><td>${i.DESTINATION}</td><td>${dot} &nbsp;<span style='background:${statusBg};color:${statusColor};padding:10px 12px;border-radius:4px;font-weight:700;font-size:14px;letter-spacing:1px;white-space:nowrap;'>${displaystatus}</span></td></tr>`;
                htmlTable+=`<tr id="stops-${i.TRAIN_ID}" style="display:none; padding:5px;max-height: 170px;overflow-y: auto;"><td colspan="4" id="stops-content-${i.TRAIN_ID}"></td></tr>`;}
            htmlTable+=`</table></div>`;
            document.getElementById("train_data").innerHTML=htmlTable;})
    }
    document.getElementById("Station").addEventListener("change",function(){
        const selectedStation = this.value;
        fetch_train_data(selectedStation);
    });
    fetch_train_data("NB");
</script>
